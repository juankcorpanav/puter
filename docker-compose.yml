version: '3.8'

services:
  puter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: puter
    restart: unless-stopped
    ports:
      - "4100:4100"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PUTER_HTTP_PORT=${PUTER_HTTP_PORT:-4100}
      - PUTER_DOMAIN=${PUTER_DOMAIN:-puter.localhost}
    volumes:
      - puter_data:/var/puter
    networks:
      - puter_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4100"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  puter_data:
    driver: local

networks:
  puter_network:
    driver: bridge
